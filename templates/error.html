<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerLens — {{ error_title or "Error Occurred" }}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 24px; background-color: var(--bg-dark);">

    <div class="card-widget-lens text-center p-5" style="max-width: 480px; width: 100%; box-shadow: var(--glow-shadow); border: 1px solid var(--border-dark); border-radius: var(--radius-lg); background-color: var(--surface-dark);">
        <div class="mb-4">
            {% if status_code == 404 %}
                <i class="fas fa-compass text-secondary" style="font-size: 3rem; color: var(--accent-indigo) !important;"></i>
            {% else %}
                <i class="fas fa-triangle-exclamation text-danger" style="font-size: 3rem; color: var(--danger) !important;"></i>
            {% endif %}
        </div>
        <h2 class="fw-bold mb-3" style="color: var(--text-main) !important;">{{ error_title or "An Error Occurred" }}</h2>
        <p class="text-secondary small mb-4" style="line-height: 1.6;">
            {{ error_message or "An unexpected issue was encountered while processing your request. Please try again." }}
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ recovery_url or '/' }}" class="btn btn-pill btn-pill-primary px-4 py-2" style="background-color: var(--primary); color: #fff; border-radius: 50px; text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-rotate-left me-2"></i> Try Again
            </a>
        </div>
    </div>

</body>
</html>
